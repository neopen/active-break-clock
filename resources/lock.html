<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>锁屏提醒</title>
    <style>
        /* 样式保持不变，省略... */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            /* 防止选择文本 */
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            /* 防止滚动 */
            position: fixed;
            top: 0;
            left: 0;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            /* 确保覆盖整个屏幕 */
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }

        .lock-card {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(20px);
            border-radius: 56px;
            padding: 48px 32px;
            margin: 20px;
            width: calc(100% - 40px);
            max-width: 380px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            /* 确保居中显示 */
            position: relative;
            z-index: 10;
        }

        .lock-icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: bounce 1s ease infinite;
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        .lock-title {
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #fff 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .lock-message {
            font-size: 18px;
            margin-bottom: 40px;
            opacity: 0.9;
            line-height: 1.6;
        }

        .timer-ring {
            position: relative;
            width: 220px;
            height: 220px;
            margin: 0 auto 32px;
        }

        .timer-circle-bg {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            position: absolute;
            top: 0;
            left: 0;
        }

        .timer-circle-progress {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            position: absolute;
            top: 0;
            left: 0;
            transform: rotate(-90deg);
        }

        .timer-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 100%;
        }

        .timer-number {
            font-size: 56px;
            font-weight: 800;
            font-family: monospace;
            background: linear-gradient(135deg, #fff 0%, #c4b5fd 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .timer-unit {
            font-size: 18px;
            margin-left: 4px;
            opacity: 0.7;
        }

        .timer-label {
            font-size: 12px;
            opacity: 0.5;
            margin-top: 6px;
        }

        .action-btn {
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            border: none;
            padding: 18px 32px;
            border-radius: 60px;
            font-size: 20px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3);
            margin-top: 20px;
        }

        .action-btn:active {
            transform: scale(0.97);
        }

        .action-btn.disabled {
            background: linear-gradient(135deg, #475569 0%, #334155 100%);
            opacity: 0.6;
            cursor: not-allowed;
            box-shadow: none;
        }

        .reminder-suggestion {
            margin-top: 32px;
            font-size: 14px;
            opacity: 0.6;
            display: flex;
            gap: 24px;
            justify-content: center;
        }

        .suggestion-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .suggestion-icon {
            font-size: 28px;
        }

        .custom-dialog-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            z-index: 20000;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes fadeOut {
            from {
                opacity: 1;
            }

            to {
                opacity: 0;
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .custom-dialog {
            background: white;
            border-radius: 32px;
            width: 320px;
            max-width: 85%;
            overflow: hidden;
            animation: slideUp 0.3s ease;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .dialog-icon {
            text-align: center;
            padding: 32px 32px 16px 32px;
            font-size: 56px;
        }

        .dialog-title {
            text-align: center;
            font-size: 22px;
            font-weight: 700;
            color: #1e293b;
            padding: 0 24px 12px 24px;
        }

        .dialog-message {
            text-align: center;
            font-size: 16px;
            color: #64748b;
            padding: 0 24px 24px 24px;
            line-height: 1.5;
        }

        .dialog-buttons {
            display: flex;
            border-top: 1px solid #e2e8f0;
        }

        .dialog-btn {
            flex: 1;
            text-align: center;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            background: white;
        }

        .dialog-btn:active {
            background: #f1f5f9;
        }

        .dialog-btn-cancel {
            color: #64748b;
            border-right: 1px solid #e2e8f0;
        }

        .dialog-btn-confirm {
            color: #f59e0b;
            font-weight: 700;
        }
    </style>

    <!-- Neutralinojs Client -->
    <!-- <script src="https://unpkg.com/@neutralinojs/lib@6.7.0"></script> -->
    <!-- <script src="js/lib/neutralino.js"></script> -->
    <script src="/neutralino.js"></script>
</head>

<body>
    <div class="lock-card">
        <div class="lock-icon">🧘</div>
        <div class="lock-title">该活动啦！</div>
        <div class="lock-message">站起来走走，伸个懒腰<br>活动一下筋骨</div>

        <div class="timer-ring" id="timerRing">
            <div class="timer-circle-bg"></div>
            <div class="timer-center">
                <span class="timer-number" id="countdownSeconds">0</span>
                <span class="timer-unit">秒</span>
                <div class="timer-label">倒计时</div>
            </div>
        </div>

        <button id="unlockBtn" class="action-btn">等待倒计时...</button>

        <div class="reminder-suggestion">
            <div class="suggestion-item">
                <span class="suggestion-icon">🚶</span>
                <span>走动一下</span>
            </div>
            <div class="suggestion-item">
                <span class="suggestion-icon">💧</span>
                <span>喝杯热水</span>
            </div>
            <div class="suggestion-item">
                <span class="suggestion-icon">👀</span>
                <span>看看远方</span>
            </div>
        </div>
    </div>

    <script>
        (function () {
            // 首先初始化 Neutralino
            if (typeof Neutralino !== 'undefined') {
                Neutralino.init().then(() => {
                    console.log('[LOCK] Neutralino initialized');
                }).catch(e => {
                    console.error('[LOCK] Neutralino init failed:', e);
                });
            }

            console.log('[LOCK] ========== LOCK PAGE INITIALIZED ==========');

            // 获取参数
            let remainingSeconds = 60;
            let forceLock = false;

            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.has('duration')) {
                const urlDuration = parseInt(urlParams.get('duration'));
                if (!isNaN(urlDuration) && urlDuration > 0) {
                    remainingSeconds = urlDuration;
                }
                forceLock = urlParams.get('forceLock') === 'true';
                console.log('[LOCK] Params:', { remainingSeconds, forceLock });
            }

            // 确保有默认值
            if (isNaN(remainingSeconds) || remainingSeconds <= 0) {
                remainingSeconds = 60;
            }

            console.log('[LOCK] Starting countdown:', remainingSeconds, 'seconds');

            // DOM 元素
            const countdownSpan = document.getElementById('countdownSeconds');
            const unlockBtn = document.getElementById('unlockBtn');
            const timerRing = document.getElementById('timerRing');

            // 先检查元素是否存在
            if (!countdownSpan || !unlockBtn || !timerRing) {
                console.error('[LOCK] Required DOM elements not found!');
                return;
            }

            let progressCircle = null;
            let timerInterval = null;
            let isClosed = false;
            let currentSeconds = remainingSeconds;
            const totalSeconds = remainingSeconds;

            // 创建进度环
            function createProgressCircle() {
                if (!progressCircle && timerRing) {
                    progressCircle = document.createElement('div');
                    progressCircle.className = 'timer-circle-progress';
                    const timerCenter = timerRing.querySelector('.timer-center');
                    if (timerCenter) {
                        timerRing.insertBefore(progressCircle, timerCenter);
                    }
                }
            }

            // 更新进度环
            function updateProgressCircle(remaining, total) {
                createProgressCircle();
                if (progressCircle) {
                    const percent = (total - remaining) / total;
                    const angle = percent * 360;
                    progressCircle.style.background = `conic-gradient(from 0deg, #a78bfa 0deg, #a78bfa ${angle}deg, rgba(255, 255, 255, 0.1) ${angle}deg)`;
                }
            }

            // 更新显示
            function updateDisplay() {
                if (countdownSpan) {
                    countdownSpan.innerText = currentSeconds;
                }
                updateProgressCircle(currentSeconds, totalSeconds);

                if (unlockBtn) {
                    if (forceLock) {
                        unlockBtn.innerText = `请等待 ${currentSeconds} 秒`;
                        unlockBtn.classList.add('disabled');
                        unlockBtn.disabled = true;
                    } else {
                        unlockBtn.innerText = `请活动 ${currentSeconds} 秒`;
                        unlockBtn.classList.remove('disabled');
                        unlockBtn.disabled = false;
                    }
                }
            }

            // 关闭窗口
            async function closeLockWindow() {
                if (isClosed) return;
                isClosed = true;

                console.log('[LOCK] Closing window');

                if (timerInterval) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                }

                if (typeof Neutralino !== 'undefined') {
                    try {
                        await Neutralino.events.dispatch('stop-sound');
                        await Neutralino.window.close();
                    } catch (e) {
                        console.error('[LOCK] Failed to close:', e);
                    }
                }
            }

            // 提前解锁
            async function onEarlyUnlock() {
                if (isClosed) return;
                if (forceLock) return;

                if (currentSeconds > 0) {
                    const confirmed = confirm('活动时间还没到，确定要提前结束吗？');
                    if (confirmed) {
                        closeLockWindow();
                    }
                } else {
                    closeLockWindow();
                }
            }

            // 开始倒计时
            function startCountdown() {
                updateDisplay();

                timerInterval = setInterval(() => {
                    if (isClosed) {
                        clearInterval(timerInterval);
                        return;
                    }

                    if (currentSeconds <= 1) {
                        clearInterval(timerInterval);
                        countdownSpan.innerText = '0';
                        closeLockWindow();
                    } else {
                        currentSeconds--;
                        updateDisplay();
                    }
                }, 1000);
            }

            // 阻止键盘操作
            document.addEventListener('keydown', (e) => {
                const blockedKeys = ['Escape', 'F11', 'F5', 'F12', 'Alt', 'Control', 'Meta'];
                if (blockedKeys.includes(e.key) ||
                    (e.ctrlKey && e.key === 'w') ||
                    (e.altKey && e.key === 'F4')) {
                    e.preventDefault();
                    return false;
                }
            });

            // 绑定事件
            unlockBtn.addEventListener('click', onEarlyUnlock);

            // 初始化显示
            countdownSpan.innerText = currentSeconds;

            // 开始
            startCountdown();

            console.log('[LOCK] Ready');
        })();
    </script>
</body>

</html>
