<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>锁屏提醒</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
        }

        .lock-card {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(20px);
            border-radius: 56px;
            padding: 48px 32px;
            margin: 20px;
            width: calc(100% - 40px);
            max-width: 380px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .lock-icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: bounce 1s ease infinite;
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        .lock-title {
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #fff 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .lock-message {
            font-size: 18px;
            margin-bottom: 40px;
            opacity: 0.9;
            line-height: 1.6;
        }

        .timer-ring {
            position: relative;
            width: 220px;
            height: 220px;
            margin: 0 auto 32px;
        }

        .timer-circle-bg {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            position: absolute;
            top: 0;
            left: 0;
        }

        .timer-circle-progress {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            position: absolute;
            top: 0;
            left: 0;
            transform: rotate(-90deg);
        }

        .timer-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 100%;
        }

        .timer-number {
            font-size: 56px;
            font-weight: 800;
            font-family: monospace;
            background: linear-gradient(135deg, #fff 0%, #c4b5fd 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .timer-unit {
            font-size: 18px;
            margin-left: 4px;
            opacity: 0.7;
        }

        .timer-label {
            font-size: 12px;
            opacity: 0.5;
            margin-top: 6px;
        }

        .action-btn {
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            border: none;
            padding: 18px 32px;
            border-radius: 60px;
            font-size: 20px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3);
            margin-top: 20px;
        }

        .action-btn:active {
            transform: scale(0.97);
        }

        .action-btn.disabled {
            background: linear-gradient(135deg, #475569 0%, #334155 100%);
            opacity: 0.6;
            cursor: not-allowed;
            box-shadow: none;
        }

        .reminder-suggestion {
            margin-top: 32px;
            font-size: 14px;
            opacity: 0.6;
            display: flex;
            gap: 24px;
            justify-content: center;
        }

        .suggestion-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .suggestion-icon {
            font-size: 28px;
        }

        /* ========== 美化的自定义确认弹框 ========== */
        .custom-dialog-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            z-index: 20000;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes fadeOut {
            from {
                opacity: 1;
            }

            to {
                opacity: 0;
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .custom-dialog {
            background: white;
            border-radius: 32px;
            width: 320px;
            max-width: 85%;
            overflow: hidden;
            animation: slideUp 0.3s ease;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .dialog-icon {
            text-align: center;
            padding: 32px 32px 16px 32px;
            font-size: 56px;
        }

        .dialog-title {
            text-align: center;
            font-size: 22px;
            font-weight: 700;
            color: #1e293b;
            padding: 0 24px 12px 24px;
        }

        .dialog-message {
            text-align: center;
            font-size: 16px;
            color: #64748b;
            padding: 0 24px 24px 24px;
            line-height: 1.5;
        }

        .dialog-buttons {
            display: flex;
            border-top: 1px solid #e2e8f0;
        }

        .dialog-btn {
            flex: 1;
            text-align: center;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            background: white;
        }

        .dialog-btn:active {
            background: #f1f5f9;
        }

        .dialog-btn-cancel {
            color: #64748b;
            border-right: 1px solid #e2e8f0;
        }

        .dialog-btn-confirm {
            color: #f59e0b;
            font-weight: 700;
        }
    </style>
</head>

<body>
    <script>
        // 注入参数 - duration 单位是秒
        window.__LOCK_PARAMS__ = {
            duration: 60,
            forceLock: false
        };
        console.log('[LOCK] Injected params - duration:', 60, 'seconds, forceLock:', false);
    </script>
    
    <div class="lock-card">
        <div class="lock-icon">🧘</div>
        <div class="lock-title">该活动啦！</div>
        <div class="lock-message">站起来走走，伸个懒腰<br>活动一下筋骨</div>

        <div class="timer-ring" id="timerRing">
            <div class="timer-circle-bg"></div>
            <div class="timer-center">
                <span class="timer-number" id="countdownSeconds">0</span>
                <span class="timer-unit">秒</span>
                <div class="timer-label">倒计时</div>
            </div>
        </div>

        <button id="unlockBtn" class="action-btn">等待倒计时...</button>

        <div class="reminder-suggestion">
            <div class="suggestion-item">
                <span class="suggestion-icon">🚶</span>
                <span>走动一下</span>
            </div>
            <div class="suggestion-item">
                <span class="suggestion-icon">💧</span>
                <span>喝杯热水</span>
            </div>
            <div class="suggestion-item">
                <span class="suggestion-icon">👀</span>
                <span>看看远方</span>
            </div>
        </div>
    </div>

    <script>
        // lock.html 中的脚本部分
        console.log('[LOCK] Script starting, checking for injected params');

        // 从注入的全局变量获取参数（单位：秒）
        let remainingSeconds = 60;  // 默认60秒（1分钟）
        let forceLock = false;

        console.log('[LOCK] Script starting, checking for injected params');

        // 优先从注入的全局变量获取
        if (typeof window.__LOCK_PARAMS__ !== 'undefined' && window.__LOCK_PARAMS__) {
            remainingSeconds = window.__LOCK_PARAMS__.duration || 60;
            forceLock = window.__LOCK_PARAMS__.forceLock || false;
            console.log('[LOCK] Params from __LOCK_PARAMS__:', { remainingSeconds, forceLock });
        }

        // 从 URL 参数获取（备用）
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('duration')) {
            const urlDuration = parseInt(urlParams.get('duration'));
            if (!isNaN(urlDuration) && urlDuration > 0) {
                remainingSeconds = urlDuration;
            }
            forceLock = urlParams.get('forceLock') === 'true';
            console.log('[LOCK] Params from URL:', { remainingSeconds, forceLock });
        }

        // 确保值有效
        if (isNaN(remainingSeconds) || remainingSeconds <= 0) {
            console.warn('[LOCK] Invalid duration, using default 60 seconds');
            remainingSeconds = 60;
        }

        console.log('[LOCK] Final values - duration:', remainingSeconds, 'seconds (', Math.floor(remainingSeconds / 60), 'minutes,', remainingSeconds % 60, 'seconds)', 'forceLock:', forceLock);

        // 显示在页面上用于调试
        const debugInfo = document.createElement('div');
        debugInfo.style.position = 'fixed';
        debugInfo.style.bottom = '10px';
        debugInfo.style.left = '10px';
        debugInfo.style.backgroundColor = 'rgba(0,0,0,0.7)';
        debugInfo.style.color = '#0f0';
        debugInfo.style.fontSize = '12px';
        debugInfo.style.padding = '5px';
        debugInfo.style.borderRadius = '5px';
        debugInfo.style.zIndex = '99999';
        debugInfo.innerHTML = `Duration: ${remainingSeconds}s | ForceLock: ${forceLock}`;
        document.body.appendChild(debugInfo);

        // 优先从注入的全局变量获取
        if (typeof window.__LOCK_PARAMS__ !== 'undefined' && window.__LOCK_PARAMS__) {
            remainingSeconds = window.__LOCK_PARAMS__.duration || 120;
            forceLock = window.__LOCK_PARAMS__.forceLock || false;
            console.log('Params from injected variable:', window.__LOCK_PARAMS__);
        }

        // 备用：从 URL 参数获取（兼容旧方式）
        if (remainingSeconds === 120) {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.has('duration')) {
                remainingSeconds = parseInt(urlParams.get('duration')) || 120;
            }
            if (urlParams.has('forceLock')) {
                forceLock = urlParams.get('forceLock') === 'true';
            }
            console.log('Params from URL:', { duration: remainingSeconds, forceLock });
        }

        console.log('Lock screen initialized: duration=', remainingSeconds, 'forceLock=', forceLock);

        // 确保 remainingSeconds 是有效数字且大于0
        if (isNaN(remainingSeconds) || remainingSeconds <= 0) {
            remainingSeconds = 120;
            console.log('Reset duration to default:', remainingSeconds);
        }

        // 确保 remainingSeconds 是整数
        remainingSeconds = Math.floor(remainingSeconds);

        const countdownSpan = document.getElementById('countdownSeconds');
        const unlockBtn = document.getElementById('unlockBtn');
        const timerRing = document.getElementById('timerRing');
        let progressCircle = null;
        let timerInterval = null;
        let isCompleted = false;
        let currentSeconds = remainingSeconds;
        let totalSeconds = remainingSeconds;

        // 创建进度圆环
        function createProgressCircle() {
            if (!progressCircle && timerRing) {
                progressCircle = document.createElement('div');
                progressCircle.className = 'timer-circle-progress';
                const timerCenter = timerRing.querySelector('.timer-center');
                if (timerCenter) {
                    timerRing.insertBefore(progressCircle, timerCenter);
                }
            }
        }

        function updateProgressCircle(remaining, total) {
            createProgressCircle();
            if (progressCircle) {
                const percent = (total - remaining) / total;
                const angle = percent * 360;
                progressCircle.style.background = `conic-gradient(from 0deg, #a78bfa 0deg, #a78bfa ${angle}deg, rgba(255, 255, 255, 0.1) ${angle}deg)`;
            }
        }

        // 美化的确认弹框
        function showConfirmDialog(options) {
            return new Promise((resolve) => {
                const { title, message, confirmText = '提前结束', cancelText = '继续活动', confirmColor = '#f59e0b' } = options;

                const overlay = document.createElement('div');
                overlay.className = 'custom-dialog-overlay';

                const dialog = document.createElement('div');
                dialog.className = 'custom-dialog';

                dialog.innerHTML = `
                    <div class="dialog-icon">⚠️</div>
                    <div class="dialog-title">${title}</div>
                    <div class="dialog-message">${message}</div>
                    <div class="dialog-buttons">
                        ${cancelText ? `<button class="dialog-btn dialog-btn-cancel">${cancelText}</button>` : ''}
                        <button class="dialog-btn dialog-btn-confirm" style="color: ${confirmColor}">${confirmText}</button>
                    </div>
                `;

                overlay.appendChild(dialog);
                document.body.appendChild(overlay);

                const cancelBtn = cancelText ? dialog.querySelector('.dialog-btn-cancel') : null;
                const confirmBtn = dialog.querySelector('.dialog-btn-confirm');

                const close = (result) => {
                    overlay.style.animation = 'fadeOut 0.2s ease';
                    setTimeout(() => {
                        overlay.remove();
                        resolve(result);
                    }, 200);
                };

                if (cancelBtn) cancelBtn.onclick = () => close(false);
                confirmBtn.onclick = () => close(true);
            });
        }

        let hasSentClose = false; // 防止重复发送关闭事件

        // 关闭锁屏窗口
        function closeLockWindow() {
            console.log('closeLockWindow called, isCompleted:', isCompleted, 'hasSentClose:', hasSentClose);

            if (isCompleted) {
                console.log('Already completed, skipping');
                return;
            }

            if (hasSentClose) {
                console.log('Already sent close, skipping');
                return;
            }

            isCompleted = true;
            hasSentClose = true;

            if (timerInterval) {
                console.log('Clearing timer interval');
                clearInterval(timerInterval);
                timerInterval = null;
            }

            // 通知主进程关闭锁屏窗口（只发送一次）
            if (window.require) {
                try {
                    const { ipcRenderer } = window.require('electron');
                    console.log('Sending lock-complete to main process');
                    ipcRenderer.send('lock-complete');
                } catch (e) {
                    console.error('Failed to send lock-complete:', e);
                    // 如果 IPC 失败，直接尝试关闭窗口
                    try {
                        window.close();
                    } catch (e2) { }
                }
            } else {
                // 非 Electron 环境，直接关闭
                try {
                    window.close();
                } catch (e) { }
            }
        }

        // 更新倒计时显示
        function updateDisplay() {
            countdownSpan.innerText = currentSeconds;
            updateProgressCircle(currentSeconds, totalSeconds);

            if (forceLock) {
                unlockBtn.innerText = `⏳ 请等待 ${currentSeconds} 秒`;
                unlockBtn.classList.add('disabled');
                unlockBtn.disabled = true;
            } else {
                unlockBtn.innerText = `⏳ 请活动 ${currentSeconds} 秒`;
                unlockBtn.classList.remove('disabled');
                unlockBtn.disabled = false;
            }
        }

        // 倒计时主函数
        function startCountdown() {
            console.log('Starting countdown from', currentSeconds, 'seconds');
            updateDisplay();

            timerInterval = setInterval(() => {
                if (currentSeconds <= 1) {
                    // 倒计时结束，自动关闭
                    console.log('Countdown finished, closing lock window');
                    clearInterval(timerInterval);
                    timerInterval = null;
                    countdownSpan.innerText = '0';
                    unlockBtn.innerText = '✅ 活动完成';
                    unlockBtn.classList.remove('disabled');
                    unlockBtn.disabled = false;

                    // 立即关闭锁屏窗口
                    closeLockWindow();
                } else {
                    currentSeconds--;
                    updateDisplay();
                }
            }, 1000);
        }

        // 提前结束按钮点击处理
        async function onEarlyUnlock() {
            console.log('onEarlyUnlock called, forceLock:', forceLock, 'currentSeconds:', currentSeconds);

            if (forceLock) {
                console.log('Force lock enabled, cannot early unlock');
                return;
            }

            if (currentSeconds > 0) {
                const confirmed = await showConfirmDialog({
                    title: '提前结束提醒',
                    message: '活动时间还没到，提前结束可能会影响健康习惯。\n确定要提前结束吗？',
                    confirmText: '提前结束',
                    cancelText: '继续活动',
                    confirmColor: '#f59e0b'
                });

                console.log('User confirmed:', confirmed);
                if (confirmed) {
                    closeLockWindow();
                }
            } else {
                closeLockWindow();
            }
        }

        // 初始化
        console.log('Initializing with currentSeconds:', currentSeconds);
        currentSeconds = remainingSeconds;
        totalSeconds = remainingSeconds;

        // 显示初始值
        countdownSpan.innerText = currentSeconds;
        updateProgressCircle(currentSeconds, totalSeconds);

        // 设置按钮状态
        if (forceLock) {
            unlockBtn.innerText = `⏳ 请等待 ${currentSeconds} 秒`;
            unlockBtn.classList.add('disabled');
            unlockBtn.disabled = true;
        } else {
            unlockBtn.innerText = `⏳ 请活动 ${currentSeconds} 秒`;
            unlockBtn.classList.remove('disabled');
            unlockBtn.disabled = false;
        }

        // 启动倒计时
        startCountdown();

        // 绑定按钮事件
        unlockBtn.addEventListener('click', onEarlyUnlock);

        // 防止用户通过键盘关闭窗口
        document.addEventListener('keydown', (e) => {
            const blockedKeys = ['Escape', 'F11', 'F5', 'F12'];
            if (blockedKeys.includes(e.key) || (e.ctrlKey && e.key === 'w') || (e.metaKey && e.key === 'w') || (e.ctrlKey && e.key === 'r')) {
                console.log('Prevented key:', e.key);
                e.preventDefault();
                return false;
            }
        });

        console.log('Lock screen ready, currentSeconds:', currentSeconds, 'forceLock:', forceLock);
    </script>
</body>

</html>
