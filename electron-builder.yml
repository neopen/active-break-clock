appId: com.neopen.activebreakclock
productName: 别坐了

# 仅保留中文语言包（可省 ~10MB 体积）
electronLanguages:
  - zh-CN

directories:
  output: release

# 严格白名单：仅打包编译产物，排除所有源码/调试文件
files:
  - dist/**/*
  - '!dist/**/*.map'

win:
  target: nsis
  icon: src/renderer/icons/icon-256.png
  asar: true
  compression: maximum

nsis:
  oneClick: false
  perMachine: true
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: 别坐了
  runAfterFinish: true
  deleteAppDataOnUninstall: true
  artifactName: HealthClock-${version}-x64-Setup.${ext}