appId: com.neopen.activebreakclock
productName: HealthClock
copyright: Copyright © 2026 neopen

# 仅保留中文语言包（可显著减小安装包体积）
electronLanguages:
  - zh-CN

directories:
  # 建议与 electron-vite 的编译输出目录(dist)分开，避免文件污染
  output: release

# 注意：使用 electron-vite 时，打包源必须指向编译后的 dist 目录，而非 src
files:
  - dist/**/*
  - '!dist/**/*.map'
  - '!**/*.log'
  - '!**/*.md'
  - '!**/*.ts'
  - '!**/node_modules/**'

extraResources:
  - from: src/renderer/icons/
    to: icons/
    filter:
      - '*.png'
      - '*.ico'

win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
  icon: src/renderer/icons/icon-256.png

portable:
  artifactName: HealthClock-${version}-x64-Portable.${ext}
  requestExecutionLevel: user

nsis:
  oneClick: false
  perMachine: true
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: 别坐了
  runAfterFinish: true
  deleteAppDataOnUninstall: true
  artifactName: HealthClock-${version}-x64-Setup.${ext}

asar: true
asarUnpack:
  - '**/*.node'
compression: maximum
removePackageScripts: true
npmRebuild: false